<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>日本旅遊記帳 APP</title>
    <style>
        :root {
            --bg-color: #F8F3E1;
            --glass-bg: rgba(227, 219, 187, 0.45);
            --glass-border: rgba(255, 255, 255, 0.4);
            --primary-color: #AEB784;
            --text-dark: #41431B;
            --danger: #FF3B30;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            padding: 20px;
            padding-bottom: 100px;
        }

        /* 液態毛玻璃效果 */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
            border-radius: 20px;
        }

        /* 頂部總計區塊 */
        .header-card {
            padding: 25px;
            text-align: center;
            margin-bottom: 20px;
        }
        .header-card h1 { font-size: 1.2rem; font-weight: 500; opacity: 0.8; }
        .header-card .total { font-size: 2.5rem; font-weight: bold; margin-top: 5px; color: var(--text-dark); }

        /* 按鈕群組 */
        .action-btns {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }
        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 15px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.96); }
        .btn-primary { background: var(--primary-color); color: white; }
        .btn-glass { background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--text-dark); }

        /* 列表區塊 (含滑動刪除) */
        .list-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow: hidden;
        }

        .swipe-item-wrapper {
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            background: var(--danger); /* 底層刪除按鈕顏色 */
        }

        .delete-btn-bg {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            z-index: 1;
        }

        .expense-card {
            position: relative;
            z-index: 2;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.3s ease-out;
            background: rgba(248, 243, 225, 0.8); /* 覆蓋層 */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: inherit;
        }

        .expense-info h3 { font-size: 1.1rem; margin-bottom: 4px; }
        .expense-info p { font-size: 0.85rem; opacity: 0.7; }
        .expense-amount { font-size: 1.2rem; font-weight: bold; }

        /* Loading 與 Modal */
        #loading, #manualModal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(65, 67, 27, 0.4);
            z-index: 100;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            width: 90%;
            max-width: 400px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .modal-content input, .modal-content select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--primary-color);
            background: transparent;
            font-size: 1rem;
            color: var(--text-dark);
        }

        .spinner {
            border: 4px solid var(--glass-border);
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            width: 40px; height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div class="header-card glass">
        <h1>總花費 (¥)</h1>
        <div class="total" id="totalAmount">0</div>
    </div>

    <div class="action-btns">
        <label class="btn btn-primary glass" style="text-align:center; display:flex; align-items:center; justify-content:center;">
            📸 AI 掃描收據
            <input type="file" id="fileInput" accept="image/*" style="display: none;">
        </label>
        <button class="btn btn-glass glass" onclick="openModal()">✍️ 手動新增</button>
    </div>

    <div class="list-container" id="expenseList">
        <!-- 列表由 JS 產生 -->
    </div>

    <!-- 載入中畫面 -->
    <div id="loading">
        <div style="text-align:center; color:white;">
            <div class="spinner"></div>
            <p style="margin-top: 15px;">AI 魔法辨識中...</p>
        </div>
    </div>

    <!-- 手動/編輯視窗 -->
    <div id="manualModal">
        <div class="modal-content glass">
            <h2 id="modalTitle">新增花費</h2>
            <input type="date" id="mDate">
            <input type="text" id="mStore" placeholder="店名/項目">
            <input type="number" id="mAmount" placeholder="金額 (日圓)">
            <select id="mCategory">
                <option value="飲食">飲食</option>
                <option value="交通">交通</option>
                <option value="購物">購物</option>
                <option value="住宿">住宿</option>
                <option value="其他">其他</option>
            </select>
            <input type="hidden" id="editIndex">
            <div style="display:flex; gap:10px;">
                <button class="btn btn-glass" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="saveManual()">儲存</button>
            </div>
        </div>
    </div>

<script>
// ======= 設定你的 Google Gemini API Key =======
const API_KEY = "AIzaSyBkWQnOBTQqtp1KvYGUlc069M6IXTlPdNQ"; // <--- 請換成你的新 Key
// ==============================================

let expenses = JSON.parse(localStorage.getItem('expenses')) || [];

function init() {
    renderList();
    document.getElementById('fileInput').addEventListener('change', handleImageUpload);
}

function renderList() {
    const list = document.getElementById('expenseList');
    let total = 0;
    list.innerHTML = '';

    expenses.sort((a, b) => new Date(b.date) - new Date(a.date));

    expenses.forEach((item, index) => {
        total += parseInt(item.amount);
        const wrapper = document.createElement('div');
        wrapper.className = 'swipe-item-wrapper';
        wrapper.innerHTML = `
            <div class="delete-btn-bg" onclick="deleteItem(${index})">刪除</div>
            <div class="expense-card" data-index="${index}" onclick="openModal(${index})">
                <div class="expense-info">
                    <h3>${item.store}</h3>
                    <p>${item.date} · ${item.category} ${item.tax ? '· '+item.tax : ''}</p>
                    ${item.items ? `<p style="font-size:0.75rem; color:#AEB784;">${item.items}</p>` : ''}
                </div>
                <div class="expense-amount">¥${item.amount.toLocaleString()}</div>
            </div>
        `;
        list.appendChild(wrapper);
    });

    document.getElementById('totalAmount').innerText = total.toLocaleString();
    localStorage.setItem('expenses', JSON.stringify(expenses));
    attachSwipeEvents(); 
}

function attachSwipeEvents() {
    const cards = document.querySelectorAll('.expense-card');
    cards.forEach(card => {
        let startX = 0, currentX = 0;
        let isSwiping = false;

        card.addEventListener('touchstart', e => {
            startX = e.touches[0].clientX;
            isSwiping = true;
            card.style.transition = 'none';
        });

        card.addEventListener('touchmove', e => {
            if (!isSwiping) return;
            currentX = e.touches[0].clientX;
            let diff = currentX - startX;
            if (diff < 0) {
                diff = Math.max(diff, -90);
                card.style.transform = `translateX(${diff}px)`;
            }
        });

        card.addEventListener('touchend', e => {
            isSwiping = false;
            card.style.transition = 'transform 0.3s ease-out';
            let diff = currentX - startX;
            if (diff < -40) {
                card.style.transform = `translateX(-80px)`;
            } else {
                card.style.transform = `translateX(0px)`;
            }
            currentX = 0; 
        });
    });
}

function deleteItem(index) {
    expenses.splice(index, 1);
    renderList();
}

function openModal(index = -1) {
    const modal = document.getElementById('manualModal');
    const d = new Date();
    const today = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

    if (index > -1) {
        document.getElementById('modalTitle').innerText = "編輯花費";
        document.getElementById('mDate').value = expenses[index].date;
        document.getElementById('mStore').value = expenses[index].store;
        document.getElementById('mAmount').value = expenses[index].amount;
        document.getElementById('mCategory').value = expenses[index].category;
        document.getElementById('editIndex').value = index;
    } else {
        document.getElementById('modalTitle').innerText = "新增花費";
        document.getElementById('mDate').value = today;
        document.getElementById('mStore').value = "";
        document.getElementById('mAmount').value = "";
        document.getElementById('mCategory').value = "購物"; // 預設改為購物
        document.getElementById('editIndex').value = "-1";
    }
    modal.style.display = 'flex';
}

function closeModal() {
    document.getElementById('manualModal').style.display = 'none';
}

function saveManual() {
    const index = parseInt(document.getElementById('editIndex').value);
    const newData = {
        date: document.getElementById('mDate').value,
        store: document.getElementById('mStore').value,
        amount: document.getElementById('mAmount').value,
        category: document.getElementById('mCategory').value,
        items: index > -1 ? expenses[index].items : "手動新增",
        tax: index > -1 ? expenses[index].tax : ""
    };

    if(!newData.store || !newData.amount) return alert("請填寫店名與金額");

    if (index > -1) {
        expenses[index] = { ...expenses[index], ...newData };
    } else {
        expenses.push(newData);
    }
    closeModal();
    renderList();
}

// === 升級版 1：圖片壓縮功能 (大幅降低 API 負擔) ===
function compressImage(file, maxWidth = 1000) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = event => {
            const img = new Image();
            img.src = event.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let width = img.width;
                let height = img.height;
                if (width > maxWidth) {
                    height = Math.round((height * maxWidth) / width);
                    width = maxWidth;
                }
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                // 轉為較小的 JPEG Base64
                resolve(canvas.toDataURL('image/jpeg', 0.8)); 
            };
        };
        reader.onerror = error => reject(error);
    });
}

async function handleImageUpload(event) {
    const file = event.target.files[0];
    if (!file) return;

    if (API_KEY === "YOUR_GEMINI_API_KEY_HERE") {
        alert("請先在程式碼中填入 Google Gemini API Key！");
        return;
    }

    document.getElementById('loading').style.display = 'flex';

    try {
        // 使用壓縮功能取代原本的直接轉換
        const base64Data = await compressImage(file);
        const base64String = base64Data.split(',')[1];
        
        // 呼叫 API
        const resultText = await callGeminiAPI(base64String, "image/jpeg");
        
        // === 升級版 2：用正規表達式強制抓出 JSON 區塊 ===
        const jsonMatch = resultText.match(/\{[\s\S]*\}/);
        if (!jsonMatch) throw new Error("AI 回傳格式錯誤，無法解析 JSON");
        
        const aiData = JSON.parse(jsonMatch[0]);

        expenses.push({
            date: aiData.date || new Date().toISOString().split('T')[0],
            store: aiData.store || "未知名稱",
            amount: aiData.amount || 0,
            category: aiData.category || "其他",
            items: (aiData.items || []).join('、'), // 用頓號隔開比較好看
            tax: aiData.tax || "含稅"
        });

        renderList();
    } catch (error) {
        console.error(error);
        // 印出真正的錯誤訊息，方便除錯
        alert("辨識失敗詳細原因: \n" + error.message);
    } finally {
        document.getElementById('loading').style.display = 'none';
        event.target.value = ''; 
    }
}

async function callGeminiAPI(base64Str, mimeType) {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
    
    // 改良版 Prompt：更嚴格規定 AI 格式，並加入免稅判斷
    const prompt = `
        這是一張日本的購物收據。請幫我提取資訊，並將商品名稱翻譯成繁體中文（如果是知名IP如ちいかわ，請翻成吉伊卡哇）。
        請根據收據內容分類為：飲食、交通、購物、住宿、其他。
        請務必"只"回傳一個 JSON 物件，絕對不要包含任何 markdown 標記、也不要有任何其他文字說明。
        格式如下：
        {
            "date": "YYYY-MM-DD",
            "store": "日文店名",
            "amount": 總結帳金額數字(只要數字，不要符號),
            "category": "分類名稱",
            "items": ["翻譯品項1", "翻譯品項2"],
            "tax": "含稅 或 未稅 或 免稅"
        }
    `;

    const requestBody = {
        contents: [{
            parts: [
                { text: prompt },
                { inline_data: { mime_type: mimeType, data: base64Str } }
            ]
        }]
    };

    const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(requestBody)
    });

    if (!response.ok) {
        const errData = await response.json();
        throw new Error(`API 請求遭拒: ${errData.error?.message || response.status}`);
    }

    const data = await response.json();
    return data.candidates[0].content.parts[0].text;
}

init();
</script>
</body>
</html>
