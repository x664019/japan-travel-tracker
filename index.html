<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>旅費帳本 · 日本</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F8F3E1;
    --card: #E3DBBB;
    --accent: #AEB784;
    --dark: #41431B;
    --dark-70: rgba(65,67,27,0.7);
    --dark-30: rgba(65,67,27,0.3);
    --dark-10: rgba(65,67,27,0.1);
    --glass: rgba(248,243,225,0.55);
    --glass-card: rgba(227,219,187,0.48);
    --glass-border: rgba(174,183,132,0.35);
    --white-glass: rgba(255,255,255,0.3);
    --blur: blur(20px) saturate(180%);
    --blur-heavy: blur(40px) saturate(200%);
    --shadow: 0 8px 32px rgba(65,67,27,0.12), 0 2px 8px rgba(65,67,27,0.08);
    --shadow-float: 0 20px 60px rgba(65,67,27,0.18), 0 4px 16px rgba(65,67,27,0.1);
    --radius: 20px;
    --radius-sm: 14px;
    --transition: all 0.38s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Zen Kaku Gothic New', 'Noto Serif TC', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% 10%, rgba(174,183,132,0.22) 0%, transparent 60%),
      radial-gradient(ellipse 60% 60% at 80% 80%, rgba(65,67,27,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 60% 20%, rgba(227,219,187,0.5) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* Floating orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.35;
    pointer-events: none;
    z-index: 0;
    animation: floatOrb 12s ease-in-out infinite;
  }
  .orb-1 { width: 300px; height: 300px; background: var(--accent); top: -80px; left: -80px; animation-delay: 0s; }
  .orb-2 { width: 200px; height: 200px; background: var(--dark); top: 50%; right: -60px; animation-delay: -4s; }
  .orb-3 { width: 250px; height: 250px; background: var(--card); bottom: -80px; left: 30%; animation-delay: -8s; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(15px, -20px) scale(1.05); }
    66% { transform: translate(-10px, 15px) scale(0.95); }
  }

  .app-wrap {
    position: relative;
    z-index: 1;
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
    padding-bottom: 100px;
  }

  /* Header */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    padding: 52px 20px 20px;
    background: var(--glass);
    backdrop-filter: var(--blur-heavy);
    -webkit-backdrop-filter: var(--blur-heavy);
    border-bottom: 1px solid var(--glass-border);
  }

  .header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .app-title {
    font-family: 'Shippori Mincho', serif;
    font-size: 28px;
    font-weight: 600;
    color: var(--dark);
    line-height: 1.2;
    letter-spacing: 0.02em;
  }

  .app-subtitle {
    font-size: 11px;
    color: var(--dark-70);
    letter-spacing: 0.12em;
    margin-top: 2px;
    font-weight: 500;
    text-transform: uppercase;
  }

  .header-date {
    font-size: 11px;
    color: var(--dark-70);
    text-align: right;
    line-height: 1.6;
  }

  /* Stats Bar */
  .stats-bar {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin: 0 20px 0;
    padding: 16px 0 0;
  }

  .stat-pill {
    background: var(--glass-card);
    backdrop-filter: var(--blur);
    -webkit-backdrop-filter: var(--blur);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-sm);
    padding: 12px 10px;
    text-align: center;
    transition: var(--transition);
  }

  .stat-pill:active { transform: scale(0.97); }

  .stat-val {
    font-family: 'Shippori Mincho', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--dark);
    line-height: 1;
  }

  .stat-label {
    font-size: 10px;
    color: var(--dark-70);
    margin-top: 4px;
    letter-spacing: 0.06em;
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 6px;
    margin: 16px 20px 0;
    background: var(--glass-card);
    backdrop-filter: var(--blur);
    -webkit-backdrop-filter: var(--blur);
    border: 1px solid var(--glass-border);
    border-radius: 50px;
    padding: 4px;
  }

  .tab-btn {
    flex: 1;
    padding: 8px 4px;
    border: none;
    background: transparent;
    border-radius: 50px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--dark-70);
    cursor: pointer;
    transition: var(--transition);
    letter-spacing: 0.04em;
  }

  .tab-btn.active {
    background: var(--dark);
    color: var(--bg);
    box-shadow: 0 2px 12px rgba(65,67,27,0.3);
  }

  /* Main Content */
  .main { padding: 16px 20px 0; }

  /* Section Title */
  .section-title {
    font-family: 'Shippori Mincho', serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--dark-70);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 10px;
    margin-top: 20px;
  }

  /* Expense Item - Swipe to Delete */
  .expense-list { display: flex; flex-direction: column; gap: 8px; }

  .swipe-wrapper {
    position: relative;
    border-radius: var(--radius);
    overflow: hidden;
  }

  .delete-bg {
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 160px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 12px;
    padding-right: 14px;
    border-radius: var(--radius);
  }

  .delete-btn-bg, .edit-btn-bg {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    width: 58px;
    height: 54px;
    border-radius: var(--radius-sm);
    justify-content: center;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.05em;
    cursor: pointer;
    border: none;
    transition: transform 0.2s ease;
  }

  .edit-btn-bg {
    background: var(--accent);
    color: var(--dark);
  }

  .delete-btn-bg {
    background: #c0392b;
    color: white;
  }

  .delete-btn-bg .icon, .edit-btn-bg .icon {
    font-size: 18px;
    line-height: 1;
  }

  .expense-card {
    position: relative;
    background: var(--glass-card);
    backdrop-filter: var(--blur);
    -webkit-backdrop-filter: var(--blur);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    padding: 14px 16px;
    transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94), box-shadow 0.3s ease;
    will-change: transform;
    touch-action: pan-y;
    user-select: none;
    cursor: grab;
  }

  .expense-card:active { cursor: grabbing; }

  .expense-card.swiped {
    transform: translateX(-160px);
    box-shadow: var(--shadow-float);
  }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
  }

  .card-store {
    font-family: 'Shippori Mincho', serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--dark);
    flex: 1;
    margin-right: 8px;
    line-height: 1.3;
  }

  .card-amount {
    font-family: 'Shippori Mincho', serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--dark);
    white-space: nowrap;
  }

  .card-amount .yen {
    font-size: 11px;
    font-weight: 500;
    margin-right: 2px;
    opacity: 0.8;
  }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  .tag {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 3px 8px;
    border-radius: 50px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.05em;
    border: 1px solid transparent;
  }

  .tag-cat {
    background: rgba(174,183,132,0.35);
    color: var(--dark);
    border-color: rgba(174,183,132,0.4);
  }

  .tag-tax {
    background: rgba(65,67,27,0.1);
    color: var(--dark-70);
    border-color: var(--dark-10);
  }

  .tag-date {
    font-size: 10px;
    color: var(--dark-70);
    margin-left: auto;
  }

  .card-items {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--dark-10);
    font-size: 11px;
    color: var(--dark-70);
    line-height: 1.7;
  }

  .card-store-jp {
    font-size: 10px;
    color: var(--dark-70);
    margin-top: 1px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
  }

  /* Empty State */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    opacity: 0.6;
  }

  .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-text { font-family: 'Shippori Mincho', serif; font-size: 15px; color: var(--dark); }
  .empty-sub { font-size: 12px; color: var(--dark-70); margin-top: 6px; }

  /* FAB */
  .fab-group {
    position: fixed;
    bottom: 28px;
    right: 20px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 10px;
    z-index: 200;
  }

  .fab-menu {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
    opacity: 0;
    pointer-events: none;
    transform: translateY(10px) scale(0.95);
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .fab-menu.open {
    opacity: 1;
    pointer-events: all;
    transform: translateY(0) scale(1);
  }

  .fab-item {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    animation: none;
  }

  .fab-label {
    background: var(--dark);
    color: var(--bg);
    padding: 6px 14px;
    border-radius: 50px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.05em;
    box-shadow: var(--shadow);
    white-space: nowrap;
  }

  .fab-mini {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    box-shadow: var(--shadow);
    transition: var(--transition);
    flex-shrink: 0;
  }

  .fab-mini:active { transform: scale(0.92); }

  .fab-mini-camera {
    background: var(--accent);
    color: var(--dark);
  }

  .fab-mini-pen {
    background: var(--card);
    color: var(--dark);
  }

  .fab-main {
    width: 58px; height: 58px;
    border-radius: 50%;
    background: var(--dark);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    color: var(--bg);
    box-shadow: var(--shadow-float);
    transition: var(--transition);
    backdrop-filter: var(--blur);
    -webkit-backdrop-filter: var(--blur);
  }

  .fab-main:active { transform: scale(0.92); }
  .fab-main.open { transform: rotate(45deg); }

  /* Overlay */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(65,67,27,0.25);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 300;
    align-items: flex-end;
    animation: fadeIn 0.2s ease;
  }

  .overlay.show { display: flex; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .sheet {
    width: 100%;
    max-width: 430px;
    margin: 0 auto;
    background: var(--glass);
    backdrop-filter: var(--blur-heavy);
    -webkit-backdrop-filter: var(--blur-heavy);
    border: 1px solid var(--glass-border);
    border-radius: 30px 30px 0 0;
    padding: 12px 20px 40px;
    box-shadow: var(--shadow-float);
    animation: slideUp 0.38s cubic-bezier(0.34, 1.56, 0.64, 1);
    max-height: 90vh;
    overflow-y: auto;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .sheet-handle {
    width: 36px; height: 4px;
    background: var(--dark-30);
    border-radius: 2px;
    margin: 0 auto 20px;
  }

  .sheet-title {
    font-family: 'Shippori Mincho', serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--dark);
    margin-bottom: 20px;
    text-align: center;
  }

  /* Receipt Upload Zone */
  .upload-zone {
    border: 2px dashed var(--glass-border);
    border-radius: var(--radius);
    padding: 30px 20px;
    text-align: center;
    cursor: pointer;
    transition: var(--transition);
    background: var(--white-glass);
    position: relative;
    overflow: hidden;
  }

  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--accent);
    background: rgba(174,183,132,0.15);
  }

  .upload-zone input[type=file] {
    position: absolute; inset: 0;
    opacity: 0; cursor: pointer;
    width: 100%; height: 100%;
  }

  .upload-icon { font-size: 36px; margin-bottom: 10px; }
  .upload-text { font-size: 14px; color: var(--dark); font-weight: 600; }
  .upload-sub { font-size: 11px; color: var(--dark-70); margin-top: 4px; }

  /* AI Processing */
  .ai-processing {
    display: none;
    text-align: center;
    padding: 20px;
  }

  .ai-processing.show { display: block; }

  .ai-spinner {
    width: 48px; height: 48px;
    border: 3px solid var(--dark-10);
    border-top-color: var(--dark);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .ai-text { font-size: 13px; color: var(--dark-70); }

  /* Form Fields */
  .form-group { margin-bottom: 14px; }

  .form-label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--dark-70);
    letter-spacing: 0.08em;
    margin-bottom: 6px;
    text-transform: uppercase;
  }

  .form-input, .form-select, .form-textarea {
    width: 100%;
    padding: 12px 14px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--glass-border);
    background: var(--white-glass);
    backdrop-filter: var(--blur);
    -webkit-backdrop-filter: var(--blur);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 14px;
    color: var(--dark);
    outline: none;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
    appearance: none;
    -webkit-appearance: none;
  }

  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(174,183,132,0.25);
  }

  .form-textarea { resize: none; height: 80px; line-height: 1.6; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .select-wrap {
    position: relative;
  }

  .select-wrap::after {
    content: '▾';
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
    color: var(--dark-70);
    font-size: 12px;
  }

  .form-select { padding-right: 32px; }

  /* Category colors */
  .cat-tag {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 4px;
  }

  /* Submit Button */
  .btn-submit {
    width: 100%;
    padding: 15px;
    background: var(--dark);
    color: var(--bg);
    border: none;
    border-radius: var(--radius);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: var(--transition);
    margin-top: 6px;
  }

  .btn-submit:active { transform: scale(0.97); opacity: 0.9; }

  .btn-secondary {
    width: 100%;
    padding: 13px;
    background: var(--glass-card);
    color: var(--dark);
    border: 1.5px solid var(--glass-border);
    border-radius: var(--radius);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
    margin-top: 8px;
  }

  /* Stats View */
  .stats-view { display: none; }
  .stats-view.active { display: block; }

  .chart-wrap {
    background: var(--glass-card);
    backdrop-filter: var(--blur);
    -webkit-backdrop-filter: var(--blur);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 12px;
  }

  .chart-title {
    font-family: 'Shippori Mincho', serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--dark);
    margin-bottom: 16px;
  }

  .cat-bar-wrap { display: flex; flex-direction: column; gap: 10px; }

  .cat-bar-item { }

  .cat-bar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 5px;
  }

  .cat-bar-name { font-size: 12px; color: var(--dark); font-weight: 600; }
  .cat-bar-val { font-size: 11px; color: var(--dark-70); }

  .cat-bar-track {
    height: 8px;
    background: var(--dark-10);
    border-radius: 4px;
    overflow: hidden;
  }

  .cat-bar-fill {
    height: 100%;
    background: var(--dark);
    border-radius: 4px;
    transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  /* Preview card */
  .preview-card {
    background: rgba(174,183,132,0.2);
    border: 1.5px solid rgba(174,183,132,0.5);
    border-radius: var(--radius-sm);
    padding: 14px;
    margin-bottom: 14px;
    animation: fadeIn 0.3s ease;
  }

  .preview-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .preview-ai-badge {
    background: var(--accent);
    color: var(--dark);
    font-size: 9px;
    padding: 1px 6px;
    border-radius: 50px;
    font-weight: 700;
  }

  .preview-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--dark);
    padding: 3px 0;
    border-bottom: 1px solid var(--dark-10);
  }

  .preview-row:last-child { border-bottom: none; }
  .preview-key { color: var(--dark-70); }

  /* Notification */
  .notif {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-100px);
    background: var(--dark);
    color: var(--bg);
    padding: 12px 24px;
    border-radius: 50px;
    font-size: 13px;
    font-weight: 600;
    z-index: 999;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap;
    letter-spacing: 0.04em;
  }

  .notif.show { transform: translateX(-50%) translateY(0); }

  /* Swipe indicator */
  .swipe-hint {
    text-align: center;
    font-size: 10px;
    color: var(--dark-30);
    letter-spacing: 0.08em;
    padding: 8px 0 4px;
  }

  /* Daily group */
  .day-group { margin-bottom: 4px; }

  .day-group-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 4px;
  }

  .day-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--dark-70);
    letter-spacing: 0.06em;
  }

  .day-total {
    font-family: 'Shippori Mincho', serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--dark);
  }

  /* Toast for delete confirmation */
  .delete-confirm {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    background: #c0392b;
    color: white;
    padding: 14px 20px;
    border-radius: var(--radius);
    font-size: 13px;
    z-index: 500;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: var(--shadow-float);
    min-width: 240px;
    display: none;
  }

  .delete-confirm.show { display: flex; }

  .confirm-undo {
    background: white;
    color: #c0392b;
    border: none;
    padding: 6px 14px;
    border-radius: 50px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    margin-left: auto;
  }

  /* Image preview in upload */
  .img-preview {
    max-width: 100%;
    max-height: 150px;
    border-radius: var(--radius-sm);
    object-fit: cover;
    margin-bottom: 12px;
    display: none;
  }

  /* Divider */
  .divider {
    height: 1px;
    background: var(--dark-10);
    margin: 8px 0;
  }

  /* Category icons */
  .cat-icon {
    font-size: 14px;
    margin-right: 2px;
  }

  /* Responsive tweaks */
  @media (max-width: 380px) {
    .stats-bar { gap: 6px; }
    .stat-val { font-size: 16px; }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--dark-30); border-radius: 2px; }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="app-wrap">
  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <div>
        <div class="app-title">旅費帳本</div>

      <div class="stat-pill">

            </select>
          </div>

<!-- Notification -->
<div class="notif" id="notif"></div>

<script>
// ============================================================
// DATA LAYER
// ============================================================
let expenses = JSON.parse(localStorage.getItem('jp_expenses') || '[]');
let editingId = null;
let fabOpen = false;
let currentTab = 'list';
let deleteTimer = null;
let swipedCard = null;

const CAT_COLORS = {
  '餐飲': '#AEB784', '交通': '#8BA0B5', '住宿': '#B58B8B',
  '購物': '#B5A88B', '景點': '#8BB58B', '藥妝': '#B58BB5',
  '便利商店': '#8BB5B5', '其他': '#A0A0A0'
};

const CAT_ICONS = {
  '餐飲': '🍜', '交通': '🚃', '住宿': '🏨', '購物': '🛍️',
  '景點': '⛩️', '藥妝': '💊', '便利商店': '🏪', '其他': '📦'
};

function save() {
  localStorage.setItem('jp_expenses', JSON.stringify(expenses));
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2);
}

// ============================================================
// RENDER
// ============================================================
function render() {
  updateStats();
  if (currentTab === 'list') renderList();
  else renderStats();
}

function updateStats() {
  const total = expenses.reduce((s, e) => s + (e.amount || 0), 0);
  const today = new Date().toISOString().slice(0, 10);
  const todayTotal = expenses.filter(e => e.date === today).reduce((s, e) => s + (e.amount || 0), 0);
  document.getElementById('statTotal').textContent = '¥' + total.toLocaleString();
  document.getElementById('statCount').textContent = expenses.length;
  document.getElementById('statToday').textContent = '¥' + todayTotal.toLocaleString();
}

function renderList() {
  const container = document.getElementById('expenseList');
  if (expenses.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🇯🇵</div>
        <div class="empty-text">還沒有消費記錄</div>
        <div class="empty-sub">點擊右下角「＋」新增第一筆費用</div>
      </div>`;
    return;
  }

  // Group by date
  const groups = {};
  const sorted = [...expenses].sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  sorted.forEach(e => {
    const d = e.date || '未知日期';
    if (!groups[d]) groups[d] = [];
    groups[d].push(e);
  });

  let html = `<div class="swipe-hint">← 左滑可編輯或刪除</div>`;

  Object.entries(groups).forEach(([date, items]) => {
    const dayTotal = items.reduce((s, e) => s + (e.amount || 0), 0);
    const dateLabel = formatDateLabel(date);
    html += `
      <div class="day-group">
        <div class="day-group-header">
          <span class="day-label">${dateLabel}</span>
          <span class="day-total">¥${dayTotal.toLocaleString()}</span>
        </div>
        <div class="expense-list">
          ${items.map(e => renderCard(e)).join('')}
        </div>
      </div>`;
  });

  container.innerHTML = html;
  attachSwipeHandlers();
}

function formatDateLabel(dateStr) {
  if (!dateStr || dateStr === '未知日期') return '未知日期';
  const d = new Date(dateStr);
  const today = new Date();
  const diff = Math.floor((today - d) / 86400000);
  const w = ['日', '一', '二', '三', '四', '五', '六'];
  const base = `${d.getMonth() + 1}/${d.getDate()} 週${w[d.getDay()]}`;
  if (diff === 0) return `今天 · ${base}`;
  if (diff === 1) return `昨天 · ${base}`;
  return base;
}

function renderCard(e) {
  const color = CAT_COLORS[e.category] || '#A0A0A0';
  const icon = CAT_ICONS[e.category] || '📦';
  return `
    <div class="swipe-wrapper" id="sw-${e.id}">
      <div class="delete-bg">
        <button class="edit-btn-bg" onclick="editExpense('${e.id}')">
          <span class="icon">✏️</span>編輯
        </button>
        <button class="delete-btn-bg" onclick="deleteExpense('${e.id}')">
          <span class="icon">🗑</span>刪除
        </button>
      </div>
      <div class="expense-card" id="card-${e.id}" data-id="${e.id}">
        <div class="card-top">
          <div>
            <div class="card-store">${icon} ${e.store || '未知店家'}</div>
            ${e.store_jp ? `<div class="card-store-jp">${e.store_jp}</div>` : ''}
          </div>
          <div class="card-amount"><span class="yen">¥</span>${(e.amount || 0).toLocaleString()}</div>
        </div>
        <div class="card-meta">
          <span class="tag tag-cat" style="background:${color}22;border-color:${color}55;color:${color};">${e.category || '其他'}</span>
          ${e.tax ? `<span class="tag tag-tax">${e.tax}</span>` : ''}
          <span class="tag-date">${e.date || ''}</span>
        </div>
        ${e.items ? `<div class="card-items">📝 ${e.items}</div>` : ''}
      </div>
    </div>`;
}

function renderStats() {
  const container = document.getElementById('catBars');
  const dailyContainer = document.getElementById('dailyChart');

  // Category breakdown
  const catTotals = {};
  expenses.forEach(e => {
    const c = e.category || '其他';
    catTotals[c] = (catTotals[c] || 0) + (e.amount || 0);
  });

  const grandTotal = Object.values(catTotals).reduce((a, b) => a + b, 0) || 1;
  const sorted = Object.entries(catTotals).sort((a, b) => b[1] - a[1]);

  if (sorted.length === 0) {
    container.innerHTML = '<div style="text-align:center;font-size:13px;color:var(--dark-70);padding:20px;">尚無資料</div>';
  } else {
    container.innerHTML = sorted.map(([cat, val]) => {
      const pct = Math.round(val / grandTotal * 100);
      const color = CAT_COLORS[cat] || '#A0A0A0';
      const icon = CAT_ICONS[cat] || '📦';
      return `
        <div class="cat-bar-item">
          <div class="cat-bar-header">
            <span class="cat-bar-name">${icon} ${cat}</span>
            <span class="cat-bar-val">¥${val.toLocaleString()} · ${pct}%</span>
          </div>
          <div class="cat-bar-track">
            <div class="cat-bar-fill" style="width:${pct}%;background:${color};"></div>
          </div>
        </div>`;
    }).join('');
  }

  // Daily bars
  const dayTotals = {};
  expenses.forEach(e => {
    if (e.date) dayTotals[e.date] = (dayTotals[e.date] || 0) + (e.amount || 0);
  });

  const days = Object.entries(dayTotals).sort((a, b) => a[0].localeCompare(b[0]));
  const maxDay = Math.max(...days.map(d => d[1]), 1);

  if (days.length === 0) {
    dailyContainer.innerHTML = '<div style="text-align:center;font-size:13px;color:var(--dark-70);padding:20px;">尚無資料</div>';
  } else {
    dailyContainer.innerHTML = `<div class="cat-bar-wrap">` + days.map(([date, val]) => {
      const pct = Math.round(val / maxDay * 100);
      const d = new Date(date);
      const label = `${d.getMonth() + 1}/${d.getDate()}`;
      return `
        <div class="cat-bar-item">
          <div class="cat-bar-header">
            <span class="cat-bar-name">${label}</span>
            <span class="cat-bar-val">¥${val.toLocaleString()}</span>
          </div>
          <div class="cat-bar-track">
            <div class="cat-bar-fill" style="width:${pct}%;background:var(--dark);"></div>
          </div>
        </div>`;
    }).join('') + `</div>`;
  }
}

// ============================================================
// SWIPE HANDLERS
// ============================================================
function attachSwipeHandlers() {
  document.querySelectorAll('.expense-card').forEach(card => {
    let startX = 0, startY = 0, isDragging = false, isHoriz = null;
    const id = card.dataset.id;

    card.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      isDragging = false;
      isHoriz = null;
    }, { passive: true });

    card.addEventListener('touchmove', e => {
      const dx = e.touches[0].clientX - startX;
      const dy = e.touches[0].clientY - startY;

      if (isHoriz === null) {
        isHoriz = Math.abs(dx) > Math.abs(dy);
      }

      if (!isHoriz) return;
      e.preventDefault();

      isDragging = true;
      const currentSwiped = card.classList.contains('swiped');
      let x = currentSwiped ? dx - 160 : dx;
      x = Math.min(0, Math.max(-160, x));
      card.style.transform = `translateX(${x}px)`;
    }, { passive: false });

    card.addEventListener('touchend', e => {
      if (!isHoriz) return;
      const dx = e.changedTouches[0].clientX - startX;
      card.style.transform = '';

      if (swipedCard && swipedCard !== card) {
        swipedCard.classList.remove('swiped');
        swipedCard = null;
      }

      if (dx < -60) {
        card.classList.add('swiped');
        swipedCard = card;
      } else if (dx > 40) {
        card.classList.remove('swiped');
        swipedCard = null;
      }
    });
  });

  // Close swiped on outside tap
  document.addEventListener('touchstart', e => {
    if (swipedCard && !swipedCard.closest('.swipe-wrapper').contains(e.target)) {
      swipedCard.classList.remove('swiped');
      swipedCard = null;
    }
  }, { passive: true });
}

// ============================================================
// SHEET / FORM
// ============================================================
function toggleFab() {
  fabOpen = !fabOpen;
  document.getElementById('fabMain').classList.toggle('open', fabOpen);
  document.getElementById('fabMenu').classList.toggle('open', fabOpen);
}

function openSheet(mode) {
  fabOpen = false;
  document.getElementById('fabMain').classList.remove('open');
  document.getElementById('fabMenu').classList.remove('open');

  editingId = null;
  resetForm();

  const isCamera = mode === 'camera';
  document.getElementById('uploadSection').style.display = isCamera ? 'block' : 'none';
  document.getElementById('divider1').style.display = isCamera ? 'block' : 'none';
  document.getElementById('sheetTitle').textContent = isCamera ? '📸 AI辨識收據' : '✍️ 手動新增費用';
  document.getElementById('submitBtn').textContent = '儲存費用';

  document.getElementById('overlay').classList.add('show');
  document.getElementById('f_date').value = new Date().toISOString().slice(0, 10);
}

function closeSheet() {
  document.getElementById('overlay').classList.remove('show');
  editingId = null;
  resetForm();
}

function resetForm() {
  ['f_store', 'f_store_jp', 'f_amount', 'f_items'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('f_cat').value = '餐飲';
  document.getElementById('f_tax').value = '含稅10%';
  document.getElementById('f_date').value = new Date().toISOString().slice(0, 10);
  document.getElementById('aiPreview').innerHTML = '';
  document.getElementById('aiProcessing').classList.remove('show');
  document.getElementById('uploadPrompt').style.display = 'block';

  const img = document.getElementById('imgPreview');
  img.style.display = 'none';
  img.src = '';
  document.getElementById('receiptInput').value = '';
}

function submitExpense() {
  const store = document.getElementById('f_store').value.trim();
  const amount = parseFloat(document.getElementById('f_amount').value);

  if (!store) { showNotif('請輸入店名'); return; }
  if (!amount || amount <= 0) { showNotif('請輸入有效金額'); return; }

  const entry = {
    id: editingId || uid(),
    store,
    store_jp: document.getElementById('f_store_jp').value.trim(),
    amount,
    date: document.getElementById('f_date').value,
    category: document.getElementById('f_cat').value,
    tax: document.getElementById('f_tax').value,
    items: document.getElementById('f_items').value.trim(),
    createdAt: editingId ? undefined : Date.now()
  };

  if (editingId) {
    const idx = expenses.findIndex(e => e.id === editingId);
    if (idx !== -1) expenses[idx] = { ...expenses[idx], ...entry };
    showNotif('✅ 已更新');
  } else {
    expenses.unshift(entry);
    showNotif('✅ 已儲存');
  }

  save();
  render();
  closeSheet();
}

function editExpense(id) {
  const e = expenses.find(x => x.id === id);
  if (!e) return;

  editingId = id;
  document.getElementById('uploadSection').style.display = 'none';
  document.getElementById('divider1').style.display = 'none';
  document.getElementById('sheetTitle').textContent = '✏️ 編輯費用';
  document.getElementById('submitBtn').textContent = '更新費用';

  document.getElementById('f_store').value = e.store || '';
  document.getElementById('f_store_jp').value = e.store_jp || '';
  document.getElementById('f_amount').value = e.amount || '';
  document.getElementById('f_date').value = e.date || '';
  document.getElementById('f_cat').value = e.category || '餐飲';
  document.getElementById('f_tax').value = e.tax || '含稅10%';
  document.getElementById('f_items').value = e.items || '';

  document.getElementById('overlay').classList.add('show');

  // Reset swiped
  if (swipedCard) { swipedCard.classList.remove('swiped'); swipedCard = null; }
}

function deleteExpense(id) {
  const idx = expenses.findIndex(e => e.id === id);
  if (idx === -1) return;

  const deleted = expenses.splice(idx, 1)[0];
  save();
  render();
  showNotif(`🗑 已刪除「${deleted.store}」`);

  if (swipedCard) { swipedCard = null; }
}

// ============================================================
// AI RECEIPT RECOGNITION
// ============================================================
async function handleReceiptUpload(event) {
  const file = event.target.files[0];
  if (!file) return;

  // Preview image
  const reader = new FileReader();
  reader.onload = e => {
    const img = document.getElementById('imgPreview');
    img.src = e.target.result;
    img.style.display = 'block';
    document.getElementById('uploadPrompt').style.display = 'none';
  };
  reader.readAsDataURL(file);

  // Show processing
  document.getElementById('aiProcessing').classList.add('show');
  document.getElementById('aiPreview').innerHTML = '';

  try {
    // Read file as base64
    const base64 = await fileToBase64(file);
    const mediaType = file.type || 'image/jpeg';

    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{
          role: "user",
          content: [
            {
              type: "image",
              source: { type: "base64", media_type: mediaType, data: base64 }
            },
            {
              type: "text",
              text: `這是一張日本收據或商店帳單照片。請仔細辨識並提取以下資訊，以JSON格式回傳（只回傳JSON，不要其他文字）：
{
  "store_zh": "店名中文翻譯",
  "store_jp": "店名日文原文",
  "amount": 金額數字(整數，日圓),
  "date": "消費日期 YYYY-MM-DD 格式，若無法確定則用今天",
  "category": "從以下選一個：餐飲、交通、住宿、購物、景點、藥妝、便利商店、其他",
  "tax": "從以下選一個：含稅10%、含稅8%、免稅、不明",
  "items": "主要購買品項中文翻譯，用逗號分隔，最多5項"
}

若圖片不是收據或無法辨識，請回傳: {"error": "無法辨識收據"}`
            }
          ]
        }]
      })
    });

    const data = await response.json();
    const text = data.content?.map(b => b.text || '').join('') || '';

    let result;
    try {
      const clean = text.replace(/```json|```/g, '').trim();
      result = JSON.parse(clean);
    } catch {
      throw new Error('解析失敗');
    }

    document.getElementById('aiProcessing').classList.remove('show');

    if (result.error) {
      document.getElementById('aiPreview').innerHTML = `
        <div style="background:rgba(192,57,43,0.1);border:1px solid rgba(192,57,43,0.3);border-radius:12px;padding:14px;text-align:center;font-size:13px;color:#c0392b;">
          ⚠️ ${result.error}<br><small style="opacity:0.7">請嘗試更清晰的收據照片，或改用手動輸入</small>
        </div>`;
      return;
    }

    // Fill form
    document.getElementById('f_store').value = result.store_zh || '';
    document.getElementById('f_store_jp').value = result.store_jp || '';
    document.getElementById('f_amount').value = result.amount || '';
    if (result.date && result.date.match(/^\d{4}-\d{2}-\d{2}$/)) {
      document.getElementById('f_date').value = result.date;
    }
    document.getElementById('f_cat').value = result.category || '餐飲';
    document.getElementById('f_tax').value = result.tax || '含稅10%';
    document.getElementById('f_items').value = result.items || '';

    // Show preview
    document.getElementById('aiPreview').innerHTML = `
      <div class="preview-card">
        <div class="preview-title">
          ✨ AI 辨識結果 <span class="preview-ai-badge">已填入表單</span>
        </div>
        <div class="preview-row"><span class="preview-key">店名</span><span>${result.store_zh || '-'}</span></div>
        <div class="preview-row"><span class="preview-key">日文原名</span><span>${result.store_jp || '-'}</span></div>
        <div class="preview-row"><span class="preview-key">金額</span><span>¥${(result.amount || 0).toLocaleString()}</span></div>
        <div class="preview-row"><span class="preview-key">類別</span><span>${result.category || '-'}</span></div>
        <div class="preview-row"><span class="preview-key">稅別</span><span>${result.tax || '-'}</span></div>
        <div class="preview-row"><span class="preview-key">品項</span><span style="text-align:right;max-width:60%;word-break:break-all;">${result.items || '-'}</span></div>
      </div>`;

  } catch (err) {
    document.getElementById('aiProcessing').classList.remove('show');
    document.getElementById('aiPreview').innerHTML = `
      <div style="background:rgba(192,57,43,0.1);border:1px solid rgba(192,57,43,0.3);border-radius:12px;padding:14px;text-align:center;font-size:13px;color:#c0392b;">
        ⚠️ AI辨識失敗，請手動填寫<br><small style="opacity:0.7">${err.message}</small>
      </div>`;
  }
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ============================================================
// TABS
// ============================================================
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && tab === 'list') || (i === 1 && tab === 'stats'));
  });
  document.getElementById('listView').style.display = tab === 'list' ? 'block' : 'none';
  document.getElementById('statsView').style.display = tab === 'stats' ? 'block' : 'none';

  if (tab === 'stats') renderStats();
}

// ============================================================
// UTILS
// ============================================================
function showNotif(msg) {
  const n = document.getElementById('notif');
  n.textContent = msg;
  n.classList.add('show');
  setTimeout(() => n.classList.remove('show'), 2500);
}

// ============================================================
// INIT
// ============================================================
function init() {
  // Header date
  const now = new Date();
  const days = ['日', '一', '二', '三', '四', '五', '六'];
  document.getElementById('headerDate').innerHTML =
    `${now.getFullYear()}年<br>${now.getMonth() + 1}月${now.getDate()}日 週${days[now.getDay()]}`;

  // Default date
  document.getElementById('f_date').value = now.toISOString().slice(0, 10);

  // Close sheet on overlay click
  document.getElementById('overlay').addEventListener('click', function(e) {
    if (e.target === this) closeSheet();
  });

  // Stop sheet click propagation
  document.getElementById('sheet').addEventListener('click', e => e.stopPropagation());

  render();
}

init();
</script>
